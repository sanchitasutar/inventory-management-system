{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Edit Supplier</h1>

<div class="form-section">

    <h4 class="mb-4">

        Update Supplier Details

    </h4>

    <form method="POST">

        <div class="row g-3">

            <!-- NAME -->

            <div class="col-md-6">

                <label class="form-label">

                    Supplier Name

                </label>

                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{supplier[1]}}"
                       required>

            </div>

            <!-- PHONE -->

            <div class="col-md-6">

                <label class="form-label">

                    Phone Number

                </label>

                <input type="text"
                       name="phone"
                       class="form-control"
                       value="{{supplier[2]}}"
                       required>

            </div>

        </div>

        <!-- BUTTONS -->

        <div class="mt-4 d-flex gap-3">

            <button class="btn btn-success">

                Update Supplier

            </button>

            <a href="/suppliers"
               class="btn btn-secondary">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
