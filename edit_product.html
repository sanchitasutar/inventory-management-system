{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Edit Product</h1>

<!-- EDIT PRODUCT SECTION -->

<div class="form-section">

    <h4 class="mb-4">
        Update Product Details
    </h4>

    <form method="POST">

        <div class="row g-3">

            <!-- PRODUCT NAME -->

            <div class="col-md-4">

                <label class="form-label">

                    Product Name

                </label>

                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{product[1]}}"
                       required>

            </div>

            <!-- PRICE -->

            <div class="col-md-4">

                <label class="form-label">

                    Product Price

                </label>

                <input type="number"
                       name="price"
                       class="form-control"
                       value="{{product[2]}}"
                       required>

            </div>

            <!-- QUANTITY -->

            <div class="col-md-4">

                <label class="form-label">

                    Available Quantity

                </label>

                <input type="number"
                       name="qty"
                       class="form-control"
                       value="{{product[3]}}"
                       required>

            </div>

        </div>

        <!-- BUTTONS -->

        <div class="mt-4 d-flex gap-3">

            <button class="btn btn-success">

                Update Product

            </button>

            <a href="/products"
               class="btn btn-secondary">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
