{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Supplier Management</h1>

<!-- ADD SUPPLIER SECTION -->

<div class="form-section">

    <h4 class="mb-4">Add New Supplier</h4>

    <form method="POST">

        <div class="row g-3">

            <!-- SUPPLIER NAME -->

            <div class="col-md-5">

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Supplier Name"
                       required>

            </div>

            <!-- PHONE -->

            <div class="col-md-4">

                <input type="text"
                       name="phone"
                       class="form-control"
                       placeholder="Phone Number">

            </div>

            <!-- BUTTON -->

            <div class="col-md-3">

                <button class="btn btn-custom w-100">

                    Add Supplier

                </button>

            </div>

        </div>

    </form>

</div>


<!-- SUPPLIER TABLE -->

<!-- SUPPLIER TABLE -->

<div class="table-container">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>Supplier Records</h3>

        <span class="badge-stock">

            Total Suppliers:
            {{suppliers|length}}

        </span>

    </div>

    <table class="table table-hover align-middle">

        <thead class="table-light">

            <tr>

                <th>ID</th>
                <th>Supplier Name</th>
                <th>Phone Number</th>
                <th>Status</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            {% for s in suppliers %}

            <tr>

                <td>{{s[0]}}</td>

                <td>
                    <strong>{{s[1]}}</strong>
                </td>

                <td>{{s[2]}}</td>

                <td>

                    <span class="badge-stock">

                        Active

                    </span>

                </td>

                <td>

                    <!-- EDIT -->

                    <a href="/edit_supplier/{{s[0]}}"
                       class="btn btn-info btn-sm">

                        Edit

                    </a>

                    <!-- DELETE -->

                   <a href="/delete_supplier/{{s[0]}}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Are you sure you want to delete this supplier?')">

    Delete

</a>
                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>
{% endblock %}
