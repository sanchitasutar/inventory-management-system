{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Customer Management</h1>

<!-- ADD CUSTOMER SECTION -->

<div class="form-section">

    <h4 class="mb-4">Add New Customer</h4>

    <form method="POST">

        <div class="row g-3">

            <div class="col-md-3">

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Customer Name"
                       required>

            </div>

            <div class="col-md-2">

                <input type="text"
                       name="phone"
                       class="form-control"
                       placeholder="Phone Number">

            </div>

            <div class="col-md-3">

                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="Email Address">

            </div>

            <div class="col-md-3">

                <input type="text"
                       name="address"
                       class="form-control"
                       placeholder="Customer Address">

            </div>

            <div class="col-md-1">

                <button class="btn btn-custom w-100">

                    Add

                </button>

            </div>

        </div>

    </form>

</div>


<!-- CUSTOMER TABLE -->

<div class="table-container">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>Customer Records</h3>

        <span class="badge-stock">

            Total Customers:
            {{customers|length}}

        </span>

    </div>

    <table class="table table-hover align-middle">

        <thead class="table-light">

            <tr>

                <th>ID</th>
                <th>Customer</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Address</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            {% for c in customers %}

            <tr>

                <td>

                    {{c[0]}}

                </td>

                <td>

                    <strong>{{c[1]}}</strong>

                </td>

                <td>

                    {{c[2]}}

                </td>

                <td>

                    {{c[3]}}

                </td>

                <td>

                    {{c[4]}}

                </td>

                <td>

                    <a href="/edit_customer/{{c[0]}}"
                       class="btn btn-info btn-sm">

                        Edit

                    </a>

                    <a href="/delete_customer/{{c[0]}}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Are you sure you want to delete this customer?')">

    Delete

</a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
