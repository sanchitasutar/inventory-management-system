{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Warehouse Management</h1>

<!-- ADD WAREHOUSE SECTION -->

<div class="form-section">

    <h4 class="mb-4">Add New Warehouse</h4>

    <form method="POST">

        <div class="row g-3">

            <!-- WAREHOUSE NAME -->

            <div class="col-md-5">

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Warehouse Name"
                       required>

            </div>

            <!-- LOCATION -->

            <div class="col-md-4">

                <input type="text"
                       name="location"
                       class="form-control"
                       placeholder="Warehouse Location">

            </div>

            <!-- BUTTON -->

            <div class="col-md-3">

                <button class="btn btn-custom w-100">

                    Add Warehouse

                </button>

            </div>

        </div>

    </form>

</div>


<!-- WAREHOUSE TABLE -->

<!-- WAREHOUSE TABLE -->

<div class="table-container">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h3>Warehouse Records</h3>

        <span class="badge-stock">

            Total Warehouses:
            {{warehouses|length}}

        </span>

    </div>

    <table class="table table-hover align-middle">

        <thead class="table-light">

            <tr>

                <th>ID</th>
                <th>Warehouse Name</th>
                <th>Location</th>
                <th>Status</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            {% for w in warehouses %}

            <tr>

                <td>{{w[0]}}</td>

                <td>
                    <strong>{{w[1]}}</strong>
                </td>

                <td>{{w[2]}}</td>

                <td>

                    <span class="badge-stock">

                        Operational

                    </span>

                </td>

                <td>

                    <a href="/edit_warehouse/{{w[0]}}"
                       class="btn btn-info btn-sm">

                        Edit

                    </a>

                    <a href="/delete_warehouse/{{w[0]}}"
   class="btn btn-danger btn-sm"
   onclick="return confirm('Are you sure you want to delete this warehouse?')">

    Delete

</a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
