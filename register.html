<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.register-card{
    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo-box{
    width:70px;
    height:70px;
    background:#16a34a;
    color:white;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:20px;
    font-size:30px;
}

.form-control{
    height:50px;
    border-radius:12px;
}

.btn-register{
    height:50px;
    border-radius:12px;
    background:#16a34a;
    color:white;
    font-weight:500;
}

.btn-register:hover{
    background:#15803d;
    color:white;
}

.auth-link{
    text-decoration:none;
    font-weight:500;
}

</style>

</head>

<body>

<div class="register-card">

    <!-- LOGO -->

    <div class="logo-box">

        <i class="bi bi-person-plus"></i>

    </div>

    <!-- TITLE -->

    <h2 class="text-center fw-bold mb-2">

        Create Account

    </h2>

    <p class="text-center text-muted mb-4">

        Register to access inventory system

    </p>

    <!-- FORM -->

    <form method="POST">

        <div class="mb-3">

            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Enter Username"
                   required>

        </div>

        <div class="mb-4">

            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Enter Password"
                   required>

        </div>

        <button type="submit"
                class="btn btn-register w-100">

            Register

        </button>

    </form>

    <!-- LOGIN LINK -->

    <div class="text-center mt-4">

        <span class="text-muted">
            Already have an account?
        </span>

        <a href="/"
           class="auth-link">

            Login

        </a>

    </div>

</div>

</body>
</html>
