{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Edit Purchase</h1>

<div class="form-section">

    <h4 class="mb-4">

        Update Purchase Details

    </h4>

    <form method="POST">

        <div class="row g-3">

            <!-- QUANTITY -->

            <div class="col-md-6">

                <label class="form-label">

                    Quantity

                </label>

                <input type="number"
                       name="qty"
                       class="form-control"
                       value="{{purchase[3]}}"
                       required>

            </div>

            <!-- PRICE -->

            <div class="col-md-6">

                <label class="form-label">

                    Price

                </label>

                <input type="number"
                       step="0.01"
                       name="price"
                       class="form-control"
                       value="{{purchase[4]}}"
                       required>

            </div>

        </div>

        <!-- BUTTONS -->

        <div class="mt-4 d-flex gap-3">

            <button class="btn btn-success">

                Update Purchase

            </button>

            <a href="/purchases"
               class="btn btn-secondary">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
