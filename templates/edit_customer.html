{% extends "base.html" %}

{% block content %}

<h1 class="page-title">Edit Customer</h1>

<div class="form-section">

    <h4 class="mb-4">
        Update Customer Details
    </h4>

    <form method="POST">

        <div class="row g-3">

            <div class="col-md-6">

                <label class="form-label">
                    Customer Name
                </label>

                <input type="text"
                       name="name"
                       class="form-control"
                       value="{{customer[1]}}"
                       required>

            </div>

            <div class="col-md-6">

                <label class="form-label">
                    Phone Number
                </label>

                <input type="text"
                       name="phone"
                       class="form-control"
                       value="{{customer[2]}}">

            </div>

            <div class="col-md-6">

                <label class="form-label">
                    Email Address
                </label>

                <input type="email"
                       name="email"
                       class="form-control"
                       value="{{customer[3]}}">

            </div>

            <div class="col-md-6">

                <label class="form-label">
                    Address
                </label>

                <input type="text"
                       name="address"
                       class="form-control"
                       value="{{customer[4]}}">

            </div>

        </div>

        <div class="mt-4 d-flex gap-3">

            <button class="btn btn-custom">

                Update Customer

            </button>

            <a href="/customers"
               class="btn btn-secondary">

                Cancel

            </a>

        </div>

    </form>

</div>

{% endblock %}
