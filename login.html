<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inventory Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.login-card{
    width:100%;
    max-width:430px;
    background:white;
    padding:45px 38px;
    border-radius:24px;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
    animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo-box{
    width:78px;
    height:78px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:24px;
    font-size:34px;
    box-shadow:0 8px 20px rgba(37,99,235,0.35);
}

.main-title{
    font-size:38px;
    font-weight:700;
    color:#0f172a;
    text-align:center;
    margin-bottom:8px;
}

.sub-title{
    text-align:center;
    color:#64748b;
    margin-bottom:32px;
    font-size:15px;
}

.form-label{
    font-weight:500;
    margin-bottom:8px;
    color:#334155;
}

.input-group{
    margin-bottom:22px;
}

.input-group-text{
    border-radius:14px 0 0 14px;
    background:#f8fafc;
    border-right:none;
    color:#64748b;
}

.form-control{
    height:54px;
    border-radius:0 14px 14px 0;
    border-left:none;
    font-size:15px;
}

.form-control:focus{
    box-shadow:none;
    border-color:#cbd5e1;
}

.btn-login{
    width:100%;
    height:54px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    font-weight:600;
    font-size:16px;
    transition:0.3s;
}

.btn-login:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 18px rgba(37,99,235,0.3);
}

.auth-link{
    text-decoration:none;
    font-weight:600;
}

.bottom-text{
    text-align:center;
    margin-top:26px;
    color:#64748b;
}

.tech-stack{
    text-align:center;
    margin-top:18px;
    font-size:13px;
    color:#94a3b8;
}

.alert{
    border-radius:12px;
}

@media(max-width:500px){

.login-card{
    padding:35px 25px;
}

.main-title{
    font-size:30px;
}

}

</style>

</head>

<body>

<div class="login-card">

    <!-- LOGO -->

    <div class="logo-box">

        <i class="bi bi-box-seam"></i>

    </div>

    <!-- TITLE -->

    <h1 class="main-title">

        Inventory System

    </h1>

    <p class="sub-title">

        Manage products, sales, purchases and inventory efficiently

    </p>

    <!-- ERROR -->

    {% if error %}

    <div class="alert alert-danger">

        {{ error }}

    </div>

    {% endif %}

    <!-- FORM -->

    <form method="POST">

        <!-- USERNAME -->

        <label class="form-label">

            Username

        </label>

        <div class="input-group">

            <span class="input-group-text">

                <i class="bi bi-person"></i>

            </span>

            <input type="text"
                   class="form-control"
                   name="username"
                   placeholder="Enter Username"
                   required>

        </div>

        <!-- PASSWORD -->

        <label class="form-label">

            Password

        </label>

        <div class="input-group">

            <span class="input-group-text">

                <i class="bi bi-lock"></i>

            </span>

            <input type="password"
                   class="form-control"
                   name="password"
                   placeholder="Enter Password"
                   required>

        </div>

        <!-- BUTTON -->

        <button type="submit"
                class="btn btn-login">

            Login

        </button>

    </form>

    <!-- REGISTER -->

    <div class="bottom-text">

        Don't have an account?

        <a href="/register"
           class="auth-link">

            Create Account

        </a>

    </div>

    <!-- TECH STACK -->

    <div class="tech-stack">

        Built with Flask • SQLite • Bootstrap

    </div>

</div>

</body>
</html>
